name: 检查所有服务更新（含 Pencil 和 Zed Nightly）

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 00:00 检查一次
  workflow_dispatch: # 支持手动触发

jobs:
  check-dida365:
    name: 检查滴答清单版本
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check-version.outputs.needs_update }}
      version: ${{ steps.upstream.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 获取上游最新版本
        id: upstream
        run: |
          LOCATION=$(curl -sI "https://dida365.com/static/getApp/download?type=linux_deb_x64" \
            | grep -i "^location:" | tr -d '\r' | awk '{print $2}')
          echo "redirect: $LOCATION"

          VERSION=$(echo "$LOCATION" | grep -oP '(?<=dida-)\d+\.\d+\.\d+(?=-amd64\.deb)')
          if [ -z "$VERSION" ]; then
            echo "::error::无法提取版本号，Location: $LOCATION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "上游最新版本: $VERSION"

      - name: 检查是否需要更新
        id: check-version
        uses: ./.github/actions/check-aur-version
        with:
          upstream_version: ${{ steps.upstream.outputs.version }}
          aur_pkg_name: zerx-lab-dida365-bin

  check-fluxdown:
    name: 检查 FluxDown 版本
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check-version.outputs.needs_update }}
      version: ${{ steps.upstream.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 获取上游最新版本
        id: upstream
        run: |
          RESPONSE=$(curl -sf "https://fluxdown.zerx.dev/api/release")
          if [ $? -ne 0 ]; then
            echo "::error::无法访问 FluxDown API"
            exit 1
          fi

          VERSION=$(echo "$RESPONSE" | jq -r '.version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::无法从 API 提取版本号，响应：$RESPONSE"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "上游最新版本: $VERSION"

      - name: 检查是否需要更新
        id: check-version
        uses: ./.github/actions/check-aur-version
        with:
          upstream_version: ${{ steps.upstream.outputs.version }}
          aur_pkg_name: zerx-lab-fluxdown-bin

  check-hexhub:
    name: 检查 HexHub 版本
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check-version.outputs.needs_update }}
      version: ${{ steps.upstream.outputs.version }}
      download_url: ${{ steps.upstream.outputs.download_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 获取上游最新版本
        id: upstream
        run: |
          RESPONSE=$(curl -s \
            -H "Origin: https://www.hexhub.cn" \
            -H "Referer: https://www.hexhub.cn/" \
            "https://api.hexhub.cn/client/plugin/master-latest-version-list")

          CODE=$(echo "$RESPONSE" | jq -r '.code')
          if [ "$CODE" != "0" ]; then
            echo "::error::API 返回异常，code=$CODE"
            exit 1
          fi

          VERSION=$(echo "$RESPONSE" | jq -r '.data["linux-amd64-deb"].versionName')
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.data["linux-amd64-deb"].downloadUrl')

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::无法从 API 提取版本号，响应：$RESPONSE"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "上游最新版本: $VERSION"
          echo "下载地址: $DOWNLOAD_URL"

      - name: 检查是否需要更新
        id: check-version
        uses: ./.github/actions/check-aur-version
        with:
          upstream_version: ${{ steps.upstream.outputs.version }}
          aur_pkg_name: zerx-lab-hexhub-bin

  update-fluxdown:
    name: 更新 FluxDown
    needs: check-fluxdown
    if: needs.check-fluxdown.outputs.needs_update == 'true'
    uses: ./.github/workflows/fluxdown-aur-update.yml
    with:
      version: ${{ needs.check-fluxdown.outputs.version }}
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

  update-dida365:
    name: 更新滴答清单
    needs: check-dida365
    if: needs.check-dida365.outputs.needs_update == 'true'
    uses: ./.github/workflows/dida365-linux-release.yml
    with:
      version: ${{ needs.check-dida365.outputs.version }}
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

  update-hexhub:
    name: 更新 HexHub
    needs: check-hexhub
    if: needs.check-hexhub.outputs.needs_update == 'true'
    uses: ./.github/workflows/hexhub-aur-update.yml
    with:
      version: ${{ needs.check-hexhub.outputs.version }}
      download_url: ${{ needs.check-hexhub.outputs.download_url }}
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

  check-pencil:
    name: 检查 Pencil 版本
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check-version.outputs.needs_update }}
      version: ${{ steps.upstream.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 获取上游最新版本
        id: upstream
        run: |
          SIGNED_URL=$(curl -sI "https://www.pencil.dev/download/Pencil-linux-x64.tar.gz" \
            | grep -i '^location:' | tr -d '\r' | cut -d' ' -f2)

          if [ -z "$SIGNED_URL" ]; then
            echo "::error::无法获取下载重定向地址"
            exit 1
          fi

          VERSION=$(curl -s -r 0-102400 "$SIGNED_URL" \
            | tar -tzf - 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')

          if [ -z "$VERSION" ]; then
            echo "::error::无法从 tarball 目录名提取版本号"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "上游最新版本: $VERSION"

      - name: 检查是否需要更新
        id: check-version
        uses: ./.github/actions/check-aur-version
        with:
          upstream_version: ${{ steps.upstream.outputs.version }}
          aur_pkg_name: zerx-lab-pencil-bin

  update-pencil:
    name: 更新 Pencil
    needs: check-pencil
    if: needs.check-pencil.outputs.needs_update == 'true'
    uses: ./.github/workflows/pencil-aur-update.yml
    with:
      version: ${{ needs.check-pencil.outputs.version }}
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

  check-zed-nightly:
    name: 检查 Zed Nightly（main 分支 commit 变化）
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.compare.outputs.needs_update }}
      commit_sha: ${{ steps.upstream.outputs.commit_sha }}
      commit_short: ${{ steps.upstream.outputs.commit_short }}
      build_date: ${{ steps.upstream.outputs.build_date }}
    steps:
      - name: 获取 Zed main 分支最新 commit
        id: upstream
        run: |
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/zed-industries/zed/commits/main")

          if [ $? -ne 0 ] || [ -z "$RESPONSE" ]; then
            echo "::error::无法访问 Zed GitHub API"
            exit 1
          fi

          COMMIT_SHA=$(echo "$RESPONSE" | jq -r '.sha')
          if [ -z "$COMMIT_SHA" ] || [ "$COMMIT_SHA" = "null" ]; then
            echo "::error::无法获取 commit SHA"
            exit 1
          fi

          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          BUILD_DATE=$(date -u +%Y%m%d)

          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "commit_short=$COMMIT_SHORT" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "Zed main 最新 commit: $COMMIT_SHA ($COMMIT_SHORT)"

      - name: 对比上次构建的 commit（通过 Release tag 判断）
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHORT="${{ steps.upstream.outputs.commit_short }}"
          BUILD_DATE="${{ steps.upstream.outputs.build_date }}"
          EXPECTED_TAG="zed-nightly-${BUILD_DATE}-${COMMIT_SHORT}"

          echo "期望 Tag: $EXPECTED_TAG"

          # 检查今天该 commit 是否已经构建过
          EXISTS=$(gh release view "$EXPECTED_TAG" \
            --repo "${{ github.repository }}" \
            --json tagName 2>/dev/null | jq -r '.tagName // empty')

          if [ "$EXISTS" = "$EXPECTED_TAG" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "今日 Zed Nightly 已构建（$EXPECTED_TAG），无需重复构建"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "发现新 commit 或尚未构建，需要构建 Zed Nightly"
          fi

  build-zed-nightly:
    name: 构建并发布 Zed Nightly
    needs: check-zed-nightly
    if: needs.check-zed-nightly.outputs.needs_update == 'true'
    uses: ./.github/workflows/zed-nightly-build.yml
    with:
      commit_sha: ${{ needs.check-zed-nightly.outputs.commit_sha }}
      commit_short: ${{ needs.check-zed-nightly.outputs.commit_short }}
      build_date: ${{ needs.check-zed-nightly.outputs.build_date }}
    secrets: inherit

  update-zed-aur:
    name: 更新 Zed Nightly AUR 包
    needs: build-zed-nightly
    if: needs.build-zed-nightly.result == 'success'
    uses: ./.github/workflows/zed-aur-update.yml
    with:
      pkgver: ${{ needs.build-zed-nightly.outputs.pkgver }}
      tag_name: ${{ needs.build-zed-nightly.outputs.tag_name }}
      sha256: ${{ needs.build-zed-nightly.outputs.sha256 }}
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
