name: 滴答清单 AUR 更新监控

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 00:00 检查一次
  workflow_dispatch: # 支持手动触发

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 检查上游最新版本
        id: upstream
        run: |
          LOCATION=$(curl -sI "https://dida365.com/static/getApp/download?type=linux_deb_x64" \
            | grep -i "^location:" | tr -d '\r' | awk '{print $2}')
          echo "redirect: $LOCATION"

          VERSION=$(echo "$LOCATION" | grep -oP '(?<=dida-)\d+\.\d+\.\d+(?=-amd64\.deb)')
          if [ -z "$VERSION" ]; then
            echo "::error::无法提取版本号，Location: $LOCATION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "上游最新版本: $VERSION"

      - name: 对比 AUR 当前版本
        id: check
        run: |
          UPSTREAM="${{ steps.upstream.outputs.version }}"
          AUR_VERSION=$(curl -s "https://aur.archlinux.org/rpc/v5/info?arg[]=zerx-lab-dida365-bin" \
            | jq -r '.results[0].Version' | cut -d'-' -f1)

          echo "上游版本: $UPSTREAM"
          echo "AUR 版本:  $AUR_VERSION"

          if [ "$UPSTREAM" = "$AUR_VERSION" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "AUR 已是最新，跳过"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "发现新版本，准备更新 AUR: $AUR_VERSION -> $UPSTREAM"
          fi

      - name: 计算 deb 包 SHA256
        id: sha256
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          curl -fL "https://dida365.com/static/getApp/download?type=linux_deb_x64" \
            -o "dida-${VERSION}-amd64.deb"
          SHA256=$(sha256sum "dida-${VERSION}-amd64.deb" | awk '{print $1}')
          echo "SHA256: $SHA256"
          echo "value=$SHA256" >> "$GITHUB_OUTPUT"

      - name: 更新 AUR PKGBUILD
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" dida365/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" dida365/aur/PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${{ steps.sha256.outputs.value }}')/" dida365/aur/PKGBUILD

          echo "更新后的 PKGBUILD："
          cat dida365/aur/PKGBUILD

      - name: 发布到 AUR
        if: steps.check.outputs.needs_update == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: zerx-lab-dida365-bin
          pkgbuild: dida365/aur/PKGBUILD
          commit_username: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update zerx-lab-dida365-bin to ${{ steps.upstream.outputs.version }}"
          force_push: "true"
