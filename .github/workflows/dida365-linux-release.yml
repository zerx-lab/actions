name: 滴答清单 AUR 更新监控

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 00:00 检查一次
  workflow_dispatch: # 支持手动触发

jobs:
  check:
    name: 检查版本
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check-version.outputs.needs_update }}
      upstream_version: ${{ steps.upstream.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 获取上游最新版本
        id: upstream
        run: |
          LOCATION=$(curl -sI "https://dida365.com/static/getApp/download?type=linux_deb_x64" \
            | grep -i "^location:" | tr -d '\r' | awk '{print $2}')
          echo "redirect: $LOCATION"

          VERSION=$(echo "$LOCATION" | grep -oP '(?<=dida-)\d+\.\d+\.\d+(?=-amd64\.deb)')
          if [ -z "$VERSION" ]; then
            echo "::error::无法提取版本号，Location: $LOCATION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "上游最新版本: $VERSION"

      - name: 检查是否需要更新
        id: check-version
        uses: ./.github/actions/check-aur-version
        with:
          upstream_version: ${{ steps.upstream.outputs.version }}
          aur_pkg_name: zerx-lab-dida365-bin

  update:
    name: 更新 AUR 包
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.needs_update == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 计算 deb 包 SHA256
        id: sha256
        run: |
          VERSION="${{ needs.check.outputs.upstream_version }}"
          curl -fL "https://dida365.com/static/getApp/download?type=linux_deb_x64" \
            -o "dida-${VERSION}-amd64.deb"
          SHA256=$(sha256sum "dida-${VERSION}-amd64.deb" | awk '{print $1}')
          echo "SHA256: $SHA256"
          echo "value=$SHA256" >> "$GITHUB_OUTPUT"

      - name: 更新 AUR PKGBUILD
        run: |
          VERSION="${{ needs.check.outputs.upstream_version }}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" dida365/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" dida365/aur/PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${{ steps.sha256.outputs.value }}')/" dida365/aur/PKGBUILD

          echo "更新后的 PKGBUILD："
          cat dida365/aur/PKGBUILD

      - name: 发布到 AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: zerx-lab-dida365-bin
          pkgbuild: dida365/aur/PKGBUILD
          commit_username: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update zerx-lab-dida365-bin to ${{ needs.check.outputs.upstream_version }}"
          force_push: "true"
