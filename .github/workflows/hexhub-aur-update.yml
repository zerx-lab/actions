name: HexHub AUR 更新

on:
  workflow_call:
    inputs:
      version:
        description: 上游最新版本号
        required: true
        type: string
      download_url:
        description: deb 包下载地址
        required: true
        type: string
    secrets:
      AUR_SSH_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 指定版本号（留空则自动获取最新版本）
        required: false
        type: string
      download_url:
        description: 指定下载地址（留空则自动获取）
        required: false
        type: string

jobs:
  update:
    name: 更新 AUR 包
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 获取上游最新版本（仅 workflow_dispatch 且未指定版本时）
        id: upstream
        if: inputs.version == ''
        run: |
          RESPONSE=$(curl -s \
            -H "Origin: https://www.hexhub.cn" \
            -H "Referer: https://www.hexhub.cn/" \
            "https://api.hexhub.cn/client/plugin/master-latest-version-list")

          CODE=$(echo "$RESPONSE" | jq -r '.code')
          if [ "$CODE" != "0" ]; then
            echo "::error::API 返回异常，code=$CODE"
            exit 1
          fi

          VERSION=$(echo "$RESPONSE" | jq -r '.data["linux-amd64-deb"].versionName')
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.data["linux-amd64-deb"].downloadUrl')

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::无法从 API 提取版本号，响应：$RESPONSE"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "上游最新版本: $VERSION"
          echo "下载地址: $DOWNLOAD_URL"

      - name: 确定目标版本和下载地址
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          DOWNLOAD_URL="${{ inputs.download_url }}"

          if [ -z "$VERSION" ]; then
            VERSION="${{ steps.upstream.outputs.version }}"
            DOWNLOAD_URL="${{ steps.upstream.outputs.download_url }}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "目标版本: $VERSION"
          echo "下载地址: $DOWNLOAD_URL"

      - name: 计算 deb 包 SHA256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DOWNLOAD_URL="${{ steps.version.outputs.download_url }}"

          echo "正在下载: $DOWNLOAD_URL"
          curl -fL "$DOWNLOAD_URL" -o "HexHub-amd64-deb-${VERSION}.deb"

          SHA256=$(sha256sum "HexHub-amd64-deb-${VERSION}.deb" | awk '{print $1}')
          echo "SHA256: $SHA256"
          echo "value=$SHA256" >> "$GITHUB_OUTPUT"

      - name: 更新 AUR PKGBUILD
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.value }}"

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" hexhub/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" hexhub/aur/PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${SHA256}')/" hexhub/aur/PKGBUILD

          echo "更新后的 PKGBUILD："
          cat hexhub/aur/PKGBUILD

      - name: 发布到 AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: zerx-lab-hexhub-bin
          pkgbuild: hexhub/aur/PKGBUILD
          commit_username: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update zerx-lab-hexhub-bin to ${{ steps.version.outputs.version }}"
          force_push: "true"
