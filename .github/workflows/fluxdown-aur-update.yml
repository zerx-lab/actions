name: FluxDown AUR 更新

on:
  workflow_call:
    inputs:
      version:
        description: 上游最新版本号
        required: true
        type: string
    secrets:
      AUR_SSH_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: 指定版本号（留空则自动获取最新版本）
        required: false
        type: string

jobs:
  update:
    name: 更新 AUR 包
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 获取上游最新版本（仅 workflow_dispatch 且未指定版本时）
        id: upstream
        if: inputs.version == ''
        run: |
          RESPONSE=$(curl -sf "https://fluxdown.zerx.dev/api/release")
          if [ $? -ne 0 ]; then
            echo "::error::无法访问 FluxDown API"
            exit 1
          fi

          VERSION=$(echo "$RESPONSE" | jq -r '.version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::无法从 API 提取版本号，响应：$RESPONSE"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "上游最新版本: $VERSION"

      - name: 确定目标版本
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ steps.upstream.outputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "目标版本: $VERSION"

      - name: 计算 tar.gz 包 SHA256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DOWNLOAD_URL="https://fluxdown.zerx.dev/api/download/FluxDown-${VERSION}-linux-x64.tar.gz"

          echo "正在下载: $DOWNLOAD_URL"
          curl -fL "$DOWNLOAD_URL" -o "FluxDown-${VERSION}-linux-x64.tar.gz"

          SHA256=$(sha256sum "FluxDown-${VERSION}-linux-x64.tar.gz" | awk '{print $1}')
          echo "SHA256: $SHA256"
          echo "value=$SHA256" >> "$GITHUB_OUTPUT"

      - name: 确定 pkgrel
        id: pkgrel
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          AUR_INFO=$(curl -s "https://aur.archlinux.org/rpc/v5/info?arg[]=zerx-lab-fluxdown-bin")
          AUR_VERSION=$(echo "$AUR_INFO" | jq -r '.results[0].Version // empty')
          AUR_PKGVER=$(echo "$AUR_VERSION" | cut -d'-' -f1)
          AUR_PKGREL=$(echo "$AUR_VERSION" | cut -d'-' -f2)

          echo "AUR 当前版本: ${AUR_VERSION:-（未发布）}"

          if [ "$VERSION" = "$AUR_PKGVER" ]; then
            PKGREL=$((AUR_PKGREL + 1))
            echo "同版本号，递增 pkgrel: $AUR_PKGREL -> $PKGREL"
          else
            PKGREL=1
            echo "新版本号，pkgrel 重置为 1"
          fi
          echo "value=$PKGREL" >> "$GITHUB_OUTPUT"

      - name: 更新 AUR PKGBUILD 和 .SRCINFO
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.value }}"
          PKGREL="${{ steps.pkgrel.outputs.value }}"

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" fluxdown/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=${PKGREL}/" fluxdown/aur/PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${SHA256}')/" fluxdown/aur/PKGBUILD

          echo "更新后的 PKGBUILD："
          cat fluxdown/aur/PKGBUILD

          # 生成 .SRCINFO
          docker run --rm \
            -v "$PWD/fluxdown/aur:/pkg" \
            -w /pkg \
            archlinux:base-devel \
            bash -c "
              pacman -Sy --noconfirm --needed sudo &&
              useradd -m builder &&
              echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers &&
              chown -R builder /pkg &&
              su builder -c 'makepkg --printsrcinfo > .SRCINFO'
            "

          echo "生成的 .SRCINFO："
          cat fluxdown/aur/.SRCINFO

      - name: 发布到 AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: zerx-lab-fluxdown-bin
          pkgbuild: fluxdown/aur/PKGBUILD
          commit_username: github-actions[bot]
          commit_email: github-actions[bot]@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update zerx-lab-fluxdown-bin to ${{ steps.version.outputs.version }}-${{ steps.pkgrel.outputs.value }}"
          force_push: "true"
