name: Zed Nightly 构建与发布

on:
  workflow_call:
    inputs:
      commit_sha:
        description: Zed main 分支最新 commit SHA
        required: true
        type: string
      commit_short:
        description: Zed main 分支最新 commit 短 SHA（7位）
        required: true
        type: string
      build_date:
        description: 构建日期（YYYYMMDD 格式）
        required: true
        type: string
    outputs:
      pkgver:
        description: 生成的包版本号（0.YYYYMMDD.shortsha）
        value: ${{ jobs.build.outputs.pkgver }}
      tag_name:
        description: 发布的 Release Tag 名称
        value: ${{ jobs.build.outputs.tag_name }}
      sha256:
        description: 打包后二进制文件的 SHA256 值
        value: ${{ jobs.build.outputs.sha256 }}
      commit_sha:
        description: 构建时使用的完整 commit SHA
        value: ${{ jobs.build.outputs.commit_sha }}
      commit_short:
        description: 构建时使用的短 commit SHA（7位）
        value: ${{ jobs.build.outputs.commit_short }}
      build_date:
        description: 构建日期（YYYYMMDD 格式）
        value: ${{ jobs.build.outputs.build_date }}
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 指定 commit SHA（留空则使用最新）
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: 编译 Zed
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
    outputs:
      pkgver: ${{ steps.meta.outputs.pkgver }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      commit_short: ${{ steps.resolve.outputs.commit_short }}
      build_date: ${{ steps.resolve.outputs.build_date }}
      sha256: ${{ steps.package.outputs.sha256 }}

    steps:
      - name: 获取 Zed 最新 commit 信息
        id: resolve
        run: |
          if [ -n "${{ inputs.commit_sha }}" ]; then
            COMMIT_SHA="${{ inputs.commit_sha }}"
          else
            COMMIT_SHA=$(curl -sf \
              -H "Authorization: Bearer ${{ github.token }}" \
              "https://api.github.com/repos/zed-industries/zed/commits/main" \
              | jq -r '.sha')
          fi

          if [ -z "$COMMIT_SHA" ] || [ "$COMMIT_SHA" = "null" ]; then
            echo "::error::无法获取 Zed 最新 commit SHA"
            exit 1
          fi

          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          BUILD_DATE=$(date -u +%Y%m%d)

          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "commit_short=$COMMIT_SHORT" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "Commit: $COMMIT_SHA ($COMMIT_SHORT), 日期: $BUILD_DATE"

      - name: 生成版本元数据
        id: meta
        run: |
          BUILD_DATE="${{ steps.resolve.outputs.build_date }}"
          COMMIT_SHORT="${{ steps.resolve.outputs.commit_short }}"
          PKGVER="0.${BUILD_DATE}.${COMMIT_SHORT}"
          TAG_NAME="zed-nightly-${BUILD_DATE}-${COMMIT_SHORT}"

          echo "pkgver=$PKGVER" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "版本号: $PKGVER"
          echo "Tag: $TAG_NAME"

      - name: 检出 Zed 源码
        uses: actions/checkout@v4
        with:
          repository: zed-industries/zed
          ref: ${{ steps.resolve.outputs.commit_sha }}
          path: zed-src
          fetch-depth: 1

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            cmake \
            clang \
            mold \
            gettext \
            pkg-config \
            libglib2.0-dev \
            libssl-dev \
            libfontconfig-dev \
            libgit2-dev \
            libsqlite3-dev \
            libzstd-dev \
            libasound2-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev

      - name: 设置 Release Channel 为 nightly
        run: |
          echo -n "nightly" > zed-src/crates/zed/RELEASE_CHANNEL
          echo "RELEASE_CHANNEL 已设置为: $(cat zed-src/crates/zed/RELEASE_CHANNEL)"

      - name: 编译 Zed（zed + cli）
        working-directory: zed-src
        run: |
          # 与官方 bundle-linux 保持一致：同时编译 zed 和 cli 两个 package
          # cli 是负责启动编辑器的 wrapper，安装后作为 bin/zed 供用户调用
          export RUSTFLAGS="-C link-arg=-fuse-ld=mold -C link-args=-Wl,--disable-new-dtags,-rpath,\$ORIGIN/../lib"
          cargo build --release --package zed --package cli

      - name: 打包（对齐官方 bundle-linux 结构）
        id: package
        working-directory: zed-src
        run: |
          PKGVER="${{ steps.meta.outputs.pkgver }}"
          ARCHIVE_NAME="zed-nightly-linux-x86_64.tar.gz"
          TARGET_DIR="target"
          TARGET_TRIPLE="x86_64-unknown-linux-gnu"

          # ── 1. Strip 调试符号（与官方一致用 objcopy --strip-debug）────────
          echo "==> Strip 调试符号..."
          SIZE_BEFORE=$(du -sh "${TARGET_DIR}/release/zed" | cut -f1)
          objcopy --strip-debug "${TARGET_DIR}/release/zed"
          objcopy --strip-debug "${TARGET_DIR}/release/cli"
          SIZE_AFTER=$(du -sh "${TARGET_DIR}/release/zed" | cut -f1)
          echo "zed 大小: ${SIZE_BEFORE} -> ${SIZE_AFTER}"

          # ── 2. 构建 .app 目录结构（与官方完全一致）──────────────────────
          echo "==> 构建 zed-nightly.app 目录结构..."
          STAGE_DIR=$(mktemp -d)
          ZED_APP="${STAGE_DIR}/zed-nightly.app"

          mkdir -p "${ZED_APP}/bin"
          mkdir -p "${ZED_APP}/libexec"
          mkdir -p "${ZED_APP}/lib"
          mkdir -p "${ZED_APP}/share/icons/hicolor/512x512/apps"
          mkdir -p "${ZED_APP}/share/icons/hicolor/1024x1024/apps"
          mkdir -p "${ZED_APP}/share/applications"

          # 二进制：zed-editor 是真正的编辑器，cli 是用户调用的 wrapper
          cp "${TARGET_DIR}/release/zed" "${ZED_APP}/libexec/zed-editor"
          cp "${TARGET_DIR}/release/cli" "${ZED_APP}/bin/zed"

          # ── 3. 打包运行时共享库（排除系统基础库，与官方一致）────────────
          echo "==> 收集运行时共享库..."
          ldd "${TARGET_DIR}/release/zed" \
            | awk '{print $3}' \
            | grep -v '^\(not\|linux-vdso\)' \
            | grep -v '\<\(libstdc++\.so\|libc\.so\|libgcc_s\.so\|libm\.so\|libpthread\.so\|libdl\.so\|libasound\.so\)\>' \
            | grep -v '^$' \
            | sort -u \
            | xargs -I{} cp {} "${ZED_APP}/lib/" 2>/dev/null || true
          echo "收集到 $(ls "${ZED_APP}/lib/" | wc -l) 个共享库"

          # ── 4. 图标（nightly 专属图标）────────────────────────────────────
          echo "==> 复制图标..."
          cp "crates/zed/resources/app-icon-nightly.png" \
            "${ZED_APP}/share/icons/hicolor/512x512/apps/zed.png"
          cp "crates/zed/resources/app-icon-nightly@2x.png" \
            "${ZED_APP}/share/icons/hicolor/1024x1024/apps/zed.png"

          # ── 5. 从官方模板生成 desktop 文件（与官方完全一致）──────────────
          echo "==> 生成 desktop 文件..."
          export APP_NAME="Zed Nightly"
          export APP_CLI="zed"
          export APP_ICON="zed"
          export APP_ARGS="%U"
          export DO_STARTUP_NOTIFY="true"
          APP_ID="dev.zed.Zed-Nightly"
          envsubst < "crates/zed/resources/zed.desktop.in" \
            > "${ZED_APP}/share/applications/${APP_ID}.desktop"

          # 追加 StartupWMClass，与 zed-editor 运行时设置的 app_id 一致
          # （release_channel::ReleaseChannel::app_id() 返回 "dev.zed.Zed-Nightly"）
          # KDE/GNOME 通过此字段将启动动画与实际窗口匹配，
          # 否则 cli exec 到 zed-editor 后桌面环境无法关联，显示终端图标
          echo "StartupWMClass=${APP_ID}" >> "${ZED_APP}/share/applications/${APP_ID}.desktop"

          chmod +x "${ZED_APP}/share/applications/${APP_ID}.desktop"
          echo "desktop 文件内容："
          cat "${ZED_APP}/share/applications/${APP_ID}.desktop"

          # ── 6. 打包为 tar.gz ──────────────────────────────────────────────
          echo "==> 打包..."
          mkdir -p "../dist"
          tar -czvf "../dist/${ARCHIVE_NAME}" -C "${STAGE_DIR}" "zed-nightly.app"
          sha256sum "../dist/${ARCHIVE_NAME}" > "../dist/${ARCHIVE_NAME}.sha256"

          SHA256=$(awk '{print $1}' "../dist/${ARCHIVE_NAME}.sha256")
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

          echo "==> 打包完成"
          echo "压缩包大小: $(du -sh "../dist/${ARCHIVE_NAME}" | cut -f1)"
          echo "SHA256: ${SHA256}"
          echo "包内结构:"
          tar -tzvf "../dist/${ARCHIVE_NAME}"

      - name: 删除已有的同名 Tag 和 Release（如果存在）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.meta.outputs.tag_name }}"

          gh release delete "$TAG_NAME" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$TAG_NAME" 2>/dev/null || true

      - name: 生成 Release Notes
        id: notes
        run: |
          TAG_NAME="${{ steps.meta.outputs.tag_name }}"
          PKGVER="${{ steps.meta.outputs.pkgver }}"
          COMMIT_SHA="${{ steps.resolve.outputs.commit_sha }}"
          COMMIT_SHORT="${{ steps.resolve.outputs.commit_short }}"
          BUILD_DATE="${{ steps.resolve.outputs.build_date }}"
          NOTES_FILE="/tmp/release-notes.md"

          cat > "$NOTES_FILE" <<EOF
          ## Zed Nightly 构建

          **构建日期**: ${BUILD_DATE}
          **上游 Commit**: [${COMMIT_SHORT}](https://github.com/zed-industries/zed/commit/${COMMIT_SHA})
          **版本号**: ${PKGVER}

          ### 包结构

          与官方发布包一致，解压后为 \`zed-nightly.app/\` 目录：
          - \`bin/zed\` — CLI wrapper，用户直接调用的入口
          - \`libexec/zed-editor\` — 真正的编辑器二进制
          - \`lib/\` — 运行时共享库
          - \`share/icons/hicolor/\` — 应用图标
          - \`share/applications/dev.zed.Zed-Nightly.desktop\` — 桌面快捷方式

          ### 安装方法

          **通过官方 install.sh（推荐）**：
          \`\`\`bash
          ZED_CHANNEL=nightly ZED_BUNDLE_PATH=/path/to/zed-nightly-linux-x86_64.tar.gz sh <(curl -fsSL https://zed.dev/install.sh)
          \`\`\`

          **手动安装**：
          \`\`\`bash
          tar -xzf zed-nightly-linux-x86_64.tar.gz -C ~/.local/
          ln -sf ~/.local/zed-nightly.app/bin/zed ~/.local/bin/zed
          \`\`\`

          **通过 AUR**：
          \`\`\`bash
          yay -S zerx-lab-zed-nightly-bin
          \`\`\`

          ### 文件

          - \`zed-nightly-linux-x86_64.tar.gz\`: x86_64 Linux 预编译包
          - \`zed-nightly-linux-x86_64.tar.gz.sha256\`: SHA256 校验文件
          EOF

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          cat "$NOTES_FILE"

      - name: 发布到 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.meta.outputs.tag_name }}"
          BUILD_DATE="${{ steps.resolve.outputs.build_date }}"
          COMMIT_SHA="${{ steps.resolve.outputs.commit_sha }}"

          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --title "Zed Nightly ${BUILD_DATE} (${COMMIT_SHA:0:7})" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            --latest=false \
            dist/zed-nightly-linux-x86_64.tar.gz \
            dist/zed-nightly-linux-x86_64.tar.gz.sha256

          echo "已发布 Release: $TAG_NAME"

      - name: 更新 latest Release 指向最新 nightly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.meta.outputs.tag_name }}"

          gh release delete "zed-nightly-latest" \
            --repo "${{ github.repository }}" \
            --yes 2>/dev/null || true

          gh api -X DELETE \
            "repos/${{ github.repository }}/git/refs/tags/zed-nightly-latest" \
            2>/dev/null || true

          gh release create "zed-nightly-latest" \
            --repo "${{ github.repository }}" \
            --title "Zed Nightly Latest" \
            --notes "该 Release 始终指向最新的 Zed Nightly 构建版本。当前指向: ${TAG_NAME}" \
            --latest=false \
            dist/zed-nightly-linux-x86_64.tar.gz \
            dist/zed-nightly-linux-x86_64.tar.gz.sha256

          echo "已更新 zed-nightly-latest Release"
